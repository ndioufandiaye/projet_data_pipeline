x-airflow-common: &airflow-common
  build: .
  user: "${AIRFLOW_UID:-50000}:0"
  restart: unless-stopped
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./notebooks:/opt/airflow/notebooks
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
    AIRFLOW_UID: "${AIRFLOW_UID:-50000}"
    JAVA_HOME: /usr/lib/jvm/default-java
    SPARK_MASTER: local[*]
    SPARK_HOME: /home/airflow/.local/lib/python3.11/site-packages/pyspark
    PYSPARK_PYTHON: python3
    PYTHONPATH: /opt/airflow

services:
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: airflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: warehouse
      MYSQL_USER: tp_user
      MYSQL_PASSWORD: tp_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "tp_user", "-ptp_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: airflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin123
        mc mb --ignore-existing local/datalake
        mc anonymous set private local/datalake
    restart: "no"

  kafka:
    image: apache/kafka:4.1.2
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/9092'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  kafka-init:
    image: apache/kafka:4.1.2
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_started
    entrypoint: /bin/bash
    command:
      - -ec
      - |
        until kafka-topics.sh --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
          sleep 5
        done
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic sales_topic --partitions 1 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic anomalies_topic --partitions 1 --replication-factor 1
    restart: "no"

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -ec
      - |
        airflow db migrate
        airflow users create --username airflow --password airflow --firstname Nek --lastname Guindogba --role Admin --email admin@example.com || true
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  marimo:
    <<: *airflow-common
    container_name: marimo-notebook
    ports:
      - "7860:7860"
    command: marimo edit --host 0.0.0.0 --port 7860 --no-token /opt/airflow/notebooks/analysis.py
    depends_on:
      minio-init:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafbat-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_started

volumes:
  postgres-db-volume:
  mysql_data:
  minio_data:
